# task_docs.yml

get_tasks:
  description: "List all tasks"
  responses:
    200:
      description: "A list of tasks"
      schema:
        type: array
        items:
          $ref: '#/definitions/Task'

create_task:
  description: "Create a new task"
  parameters:
    - name: body
      in: body
      required: true
      schema:
        $ref: '#/definitions/Task'
  responses:
    201:
      description: "Task created"
      schema:
        $ref: '#/definitions/Task'

definitions:
  Task:
    type: object
    properties:
      id:
        type: integer
      title:
        type: string
      description:
        type: string
      status:
        type: string
