{% extends "base.html" %}

{% block content %}
<h2>Add Task</h2>

<form method="POST">
    {{ form.hidden_tag() }}

    <div class="mb-3">
        {{ form.title.label }}
        {{ form.title(class="form-control") }}

        <!-- 👇 ADD ERROR BLOCK HERE -->
        {% for error in form.title.errors %}
            <div class="text-danger">{{ error }}</div>
        {% endfor %}

    </div>

    {{ form.submit(class="btn btn-primary") }}
</form>

{% endblock %}
